name: Build & Release OrangeFox R12.1 - Oppo A5s

on:
  workflow_dispatch: # Jalankan manual dari tab Actions

permissions:
  contents: write # Izin untuk membuat Release

jobs:
  build:
    name: Build OrangeFox
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Swap Space (12GB)
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 12

      - name: Cleanup & Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig libncurses5-dev rsync python2 python3
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      - name: Initialize OrangeFox Manifest (Anti-Auth Bypass)
        run: |
          mkdir workspace
          cd workspace
          
          # 1. MATIKAN TOTAL CREDENTIAL HELPER (Penyebab Utama)
          git config --global --unset-all credential.helper || true
          sudo git config --system --unset-all credential.helper || true
          
          # 2. PAKSA GIT MENGGUNAKAN HTTPS TANPA TOKEN
          # Perintah ini akan memaksa git mengabaikan token github_pat atau GITHUB_TOKEN
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://github.com/".insteadOf "gh:"
          
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # 3. INIT DENGAN OPTIMASI MAKSIMAL
          # Menggunakan --no-repo-verify untuk menghindari pengecekan GPG yang sering gagal
          repo init --no-repo-verify -u https://github.com/OrangeFoxRecovery/manifest.git -b fox_9.0 --depth=1
          
          # 4. SYNC DENGAN FLAG ANTI-INTERAKTIF
          export GIT_TERMINAL_PROMPT=0
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags
      - name: "Clone Device Tree (Branch: main)"
        run: |
          cd workspace
          git clone --depth=1 -b main https://github.com/ZG089/android_device_OPPO_CPH1909 device/oppo/CPH1909

      - name: Inject R12.1 & Encryption Fix Variables
        run: |
          cd workspace
          cat << 'EOF' >> device/oppo/CPH1909/BoardConfig.mk

          # --- ORANGEFOX R12.1 CONFIGURATION ---
          FOX_VERSION := "R12.1"
          FOX_VARIANT := "Stable"
          FOX_BUILD_TYPE := "Unofficial"
          
          # --- PARTITION INFO ---
          OFOX_AB_DEVICE := false
          OFOX_VIRTUAL_AB_DEVICE := false
          FOX_RECOVERY_INSTALL_PARTITION := "/recovery"
          FOX_RECOVERY_SYSTEM_PARTITION := "/system"
          FOX_RECOVERY_VENDOR_PARTITION := "/vendor"
          FOX_RECOVERY_BOOT_PARTITION := "/boot"

          # --- FIX ENCRYPTION BUG (Internal 0MB Fix) ---
          OFOX_DISABLE_FORCED_ENCRYPTION := true
          OFOX_DISABLE_DM_VERITY := true
          FOX_USE_DATA_RECOVERY_FOR_SETTINGS := true
          
          # --- TERMINAL UTILITIES ---
          FOX_USE_BASH := true
          FOX_ASH_IS_BASH := true
          FOX_USE_NANO := true
          FOX_USE_TAR := true
          FOX_USE_SED := true
          FOX_USE_XZ_UTILS := true
          FOX_ENABLE_APP_MANAGER := true

          # --- MISC ---
          FOX_BUGGED_AOSP_ARB_WORKAROUND := "1510672800"
          EOF

      - name: Compile Recovery Image
        run: |
          cd workspace
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          export LC_ALL="C"
          lunch omni_CPH1909-eng
          mka recoveryimage

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          tag_name: R12.1-${{ github.run_id }}
          name: OrangeFox R12.1 - Oppo A5s (CPH1909)
          body: |
            **Build Otomatis OrangeFox Recovery untuk Oppo A5s**
            * **Versi:** R12.1 (Unofficial)
            * **Fitur Tambahan:** Bypass Forced Encryption (Fix memori 0MB) & Terminal Utils (Nano, Bash).
            * *Catatan:* Jika memori masih 0MB saat pertama masuk, lakukan Format Data (ketik 'yes') satu kali.
          files: |
            workspace/out/target/product/CPH1909/recovery.img
            workspace/out/target/product/CPH1909/OrangeFox*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
